<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notificación - Interbank</title>
    <link rel="icon" href="img/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
    /* Elimina el recuadro azul al hacer clic en celulares */
    -webkit-tap-highlight-color: transparent;
    outline: none !important;
    
    /* Bloquea la selección de texto en toda la app */
    -webkit-user-select: none; 
    -moz-user-select: none; 
    -ms-user-select: none; 
    user-select: none; 
}

/* Excepción para que sí se pueda seleccionar/escribir en los inputs */
input, textarea {
    -webkit-user-select: auto;
    -moz-user-select: auto;
    -ms-user-select: auto;
    user-select: auto;
}
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; font-family: 'Nunito', sans-serif; }
        
        body { background-color: #e5e7eb; display: flex; justify-content: center; height: 100vh; overflow: hidden; }

        .mobile-wrapper { width: 100%; max-width: 480px; background-color: #fafbfc; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 100%; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background-color: #ffffff; flex-shrink: 0; border-bottom: 1px solid #f0f0f0; z-index: 100; }
        .header .title { font-size: 18px; font-weight: 700; color: #000; flex-grow: 1; text-align: center; }
        .header .right-space { width: 34px; } 
        .back-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 5px; }
        .back-btn svg { width: 24px; height: 24px; stroke: #00b551; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }

        /* CONTENIDO FORMULARIO */
        .view { flex: 1; overflow-y: auto; padding: 25px 20px; }
        .view::-webkit-scrollbar { width: 0px; background: transparent; }

        .form-card { background: #ffffff; border-radius: 16px; padding: 25px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group:last-child { margin-bottom: 0; }
        
        .label { font-size: 13px; font-weight: 700; color: #555; margin-bottom: 8px; display: block; }
        
        .input-control { width: 100%; border: 1.5px solid #e0e4e8; border-radius: 8px; padding: 14px 15px; font-size: 16px; color: #333; background-color: #fbfbfb; transition: border-color 0.2s, background-color 0.2s; }
        .input-control:focus { border-color: #00b551; background-color: #ffffff; }

        /* Contenedor Moneda + Monto */
        .monto-row { display: flex; gap: 10px; }
        .monto-row select { width: 35%; }
        .monto-row input { width: 65%; }

        /* BOTÓN PROGRAMAR */
        .btn-programar { background-color: #00b551; color: white; border: none; border-radius: 8px; padding: 16px; width: 100%; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s, transform 0.1s; box-shadow: 0 4px 12px rgba(0, 181, 81, 0.25); margin-top: 10px; }
        .btn-programar:active { background-color: #009e47; transform: scale(0.98); }

        /* ========================================= */
        /* DISEÑO DE LA NOTIFICACIÓN FALSA (ESTILO iOS/ANDROID) */
        /* ========================================= */
        .push-notification {
            position: absolute;
            top: -100px; /* Oculta arriba por defecto */
            left: 5%;
            width: 90%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            display: flex;
            align-items: flex-start;
            padding: 14px 16px;
            z-index: 9999;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Efecto rebote */
        }
        
        .push-notification.show { top: 20px; } /* Clase que la hace bajar */

        .push-icon {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            object-fit: cover;
            margin-right: 12px;
            flex-shrink: 0;
            background-color: #f0f0f0; /* Fondo por si no carga la imagen */
        }

        .push-content { flex: 1; }

        .push-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
        .push-title { font-size: 14px; font-weight: 700; color: #000; letter-spacing: -0.3px; }
        .push-time { font-size: 12px; color: #888; font-weight: 500; }

        .push-body { font-size: 14px; color: #222; line-height: 1.3; font-weight: 500; }
        
        /* Modal de confirmación al programar */
        .toast-success { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 20px; border-radius: 30px; font-size: 14px; font-weight: 600; opacity: 0; transition: opacity 0.3s; z-index: 1000; pointer-events: none; white-space: nowrap; }
    </style>
</head>
<body>

    <div class="mobile-wrapper">
        
        <audio id="audioNoti" src="noti.mp3" preload="auto"></audio>

        <div class="push-notification" id="fakePush">
            <img src="img/interbank_wrdgas.webp" alt="IBK" class="push-icon">
            <div class="push-content">
                <div class="push-header">
                    <span class="push-title">Interbank</span>
                    <span class="push-time">Ahora</span>
                </div>
                <div class="push-body" id="pushMessage"></div>
            </div>
        </div>

        <header class="header">
            <button class="back-btn" onclick="window.location.href='sobre.html'">
                <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <div class="title">Programar Pago</div>
            <div class="right-space"></div>
        </header>

        <div class="view">
            <div class="form-card">
                
                <div class="form-group">
                    <label class="label">Nombre del Destinatario</label>
                    <input type="text" id="inputNombre" class="input-control" placeholder="Ej: Cuenta Simple Soles" autocomplete="off">
                </div>

                <div class="form-group">
                    <label class="label">Moneda y Monto</label>
                    <div class="monto-row">
                        <select id="inputMoneda" class="input-control">
                            <option value="S/">S/</option>
                            <option value="U$D">U$D</option>
                        </select>
                        <input type="number" id="inputMonto" class="input-control" placeholder="0.00" step="0.01">
                    </div>
                </div>

                <div class="form-group">
                    <label class="label">Retraso (En Minutos)</label>
                    <input type="number" id="inputMinutos" class="input-control" placeholder="Ej: 2" min="0" step="0.5">
                </div>

                <button class="btn-programar" onclick="programarNotificacion()">Programar Notificación</button>
            </div>
        </div>

        <div class="toast-success" id="toastMsg">Notificación programada</div>
    </div>

    <script>
        function programarNotificacion() {
            // 1. Recolectar datos
            const nombre = document.getElementById('inputNombre').value.trim();
            const moneda = document.getElementById('inputMoneda').value;
            let monto = document.getElementById('inputMonto').value;
            const minutos = parseFloat(document.getElementById('inputMinutos').value);

            // Validación simple
            if (!nombre || !monto || isNaN(minutos)) {
                alert("Por favor completa todos los campos.");
                return;
            }

            // Formatear monto para que siempre tenga 2 decimales (ej: 12 -> 12.00)
            monto = parseFloat(monto).toFixed(2);

            // 2. Armar el texto calcado a tu referencia
            const mensajeFinal = `${nombre} te ha transferido ${moneda} ${monto}`;

            // 3. Calcular milisegundos
            const delayEnMs = minutos * 60 * 1000;

            // 4. "Truco" para celulares: Desbloquear el audio
            // Los navegadores bloquean audios si el usuario no tocó la pantalla.
            // Al hacer "play" y "pause" inmediato durante el clic del botón, lo desbloqueamos.
            const audio = document.getElementById('audioNoti');
            audio.play().then(() => {
                audio.pause();
                audio.currentTime = 0;
            }).catch(e => console.log("Audio no pudo ser desbloqueado:", e));

            // 5. Mostrar confirmación en pantalla
            const toast = document.getElementById('toastMsg');
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 3000);

            // 6. Activar la bomba de tiempo
            setTimeout(() => {
                // Inyectar el texto
                document.getElementById('pushMessage').innerText = mensajeFinal;
                
                // Reproducir el sonido
                audio.play().catch(e => console.log("Error al reproducir audio automático:", e));
                
                // Bajar la notificación (Efecto visual)
                const pushVisual = document.getElementById('fakePush');
                pushVisual.classList.add('show');

                // Ocultarla automáticamente después de 6 segundos
                setTimeout(() => {
                    pushVisual.classList.remove('show');
                }, 6000);

            }, delayEnMs);
        }
    </script>
</body>
</html>
