<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Interbank</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; font-family: 'Nunito', sans-serif; }
        
        body { background-color: #e5e7eb; display: flex; justify-content: center; height: 100vh; overflow: hidden; }

        .mobile-wrapper { width: 100%; max-width: 480px; background-color: #ffffff; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 100%; }

        /* --- ZONA SUPERIOR VERDE --- */
        .top-green-section {
            background-color: #00b551;
            flex: 0 0 45%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            width: 100%;
        }

        .header-spacer { width: 28px; }

        .logo-box {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Nuevo estilo para tu icon.webp */
        .logo-icon-img {
            width: 28px;
            height: 28px;
            object-fit: contain;
            border-radius: 6px;
        }
        
        .logo-text {
            color: #ffffff; /* Texto Blanco puro */
            font-size: 24px;
            font-weight: 800;
            margin-left: 8px;
            letter-spacing: -0.5px;
        }

        .hamburger-btn {
            background: none; border: none; cursor: pointer; display: flex;
        }
        .hamburger-btn svg { width: 30px; height: 30px; stroke: white; stroke-width: 2.5; stroke-linecap: round; }

        .greeting-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 40px;
        }
        .greeting-text {
            color: white;
            font-size: 34px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* --- TARJETA BLANCA INFERIOR --- */
        .bottom-white-card {
            background-color: #ffffff;
            flex: 1;
            border-radius: 20px 20px 0 0;
            margin-top: -30px;
            padding: 35px 25px 25px;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        .input-label {
            font-size: 14px;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            border: 1.5px solid #e0e4e8;
            border-radius: 8px;
            padding: 14px 15px;
            margin-bottom: 25px;
            background-color: #fbfbfb;
            transition: border-color 0.2s;
        }
        .input-wrapper.active {
            border-color: #00b551;
            background-color: #ffffff;
        }

        .pass-input {
            border: none;
            background: transparent;
            flex: 1;
            font-size: 16px;
            color: #333;
            letter-spacing: 2px;
        }
        .pass-input::placeholder {
            color: #a0a0a0;
            letter-spacing: normal;
            font-size: 15px;
        }

        .eye-toggle {
            width: 24px;
            height: 24px;
            object-fit: contain;
            cursor: pointer;
            opacity: 0.4;
        }

        /* Fila de Ingreso (Huella + Botón) */
        .action-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        /* Imagen de huella dactilar */
        .fingerprint-img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            opacity: 0.5;
        }

        .btn-ingresar {
            color: white;
            border: none;
            border-radius: 8px;
            padding: 16px;
            flex: 1;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s, box-shadow 0.2s;
        }
        
        /* Estado activo (Verde con sombra) */
        .btn-ingresar.active-btn {
            background-color: #00b551;
            box-shadow: 0 4px 12px rgba(0, 181, 81, 0.25);
        }
        .btn-ingresar.active-btn:active { background-color: #009e47; }
        
        /* Estado inactivo (Gris sin sombra) */
        .btn-ingresar.disabled-btn {
            background-color: #c4c4c4;
            box-shadow: none;
            cursor: not-allowed;
        }

        .forgot-link {
            text-align: center;
            color: #00b551;
            font-weight: 700;
            font-size: 14.5px;
            text-decoration: none;
        }

        /* Acciones Rápidas (Bottom) */
        .quick-actions {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: auto;
        }

        .qa-card {
            background-color: #ffffff;
            border: 1.5px solid #f0f0f0;
            border-radius: 14px;
            flex: 1;
            padding: 15px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            cursor: pointer;
        }

        .qa-icon-svg {
            width: 28px;
            height: 28px;
            margin-bottom: 8px;
        }
        .qa-icon-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            margin-bottom: 6px;
        }

        .qa-text {
            font-size: 12px;
            color: #666;
            line-height: 1.3;
            font-weight: 600;
        }

    </style>
</head>
<body>

    <div class="mobile-wrapper">
        
        <div class="top-green-section">
            <div class="header-bar">
                <div class="header-spacer"></div>
                
                <div class="logo-box">
                    <img src="img/icon.webp" alt="Interbank Icon" class="logo-icon-img">
                    <span class="logo-text">Interbank</span>
                </div>

                <button class="hamburger-btn">
                    <svg viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                </button>
            </div>
            
            <div class="greeting-container">
                <div class="greeting-text">Hola</div>
            </div>
        </div>

        <div class="bottom-white-card">
            
            <div class="input-label">Contraseña</div>
            <div class="input-wrapper" id="inputContainer">
                <input type="password" id="passInput" class="pass-input" placeholder="Ingresa tu contraseña" maxlength="6" inputmode="numeric">
                <img src="img/close-eye.svg" alt="Mostrar" class="eye-toggle" id="eyeIcon" onclick="togglePassword()">
            </div>

            <div class="action-row">
                <img src="img/huella-dactilar.png" alt="Huella" class="fingerprint-img">
                
                <button class="btn-ingresar disabled-btn" id="ingresarBtn" onclick="intentarIngresar()">Ingresar</button>
            </div>

            <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>

            <div class="quick-actions">
                <div class="qa-card">
                    <svg class="qa-icon-svg" viewBox="0 0 24 24" fill="none" stroke="#00b551" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="5" y="11" width="14" height="10" rx="2" ry="2" fill="#e8f7f0"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <div class="qa-text">Bloquear<br>tarjeta</div>
                </div>

                <div class="qa-card">
                    <svg class="qa-icon-svg" viewBox="0 0 24 24" fill="none" stroke="#00a0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7" rx="1" fill="#e5f4ff"></rect>
                        <rect x="14" y="3" width="7" height="7" rx="1" fill="#e5f4ff"></rect>
                        <rect x="14" y="14" width="7" height="7" rx="1" fill="#e5f4ff"></rect>
                        <rect x="3" y="14" width="7" height="7" rx="1" fill="#e5f4ff"></rect>
                    </svg>
                    <div class="qa-text">Pagar con<br>QR</div>
                </div>

                <div class="qa-card">
                    <img src="img/plin.png" alt="Plin" class="qa-icon-img">
                    <div class="qa-text">Pagar a<br>celular</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const inputContainer = document.getElementById('inputContainer');
        const passInput = document.getElementById('passInput');
        const eyeIcon = document.getElementById('eyeIcon');
        const ingresarBtn = document.getElementById('ingresarBtn');

        // Efectos al tocar el input de contraseña
        passInput.addEventListener('focus', () => {
            inputContainer.classList.add('active');
        });
        passInput.addEventListener('blur', () => {
            inputContainer.classList.remove('active');
        });

        // Alternar visualización del ojito
        function togglePassword() {
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.src = 'img/open-eye.svg';
                eyeIcon.style.opacity = '0.8';
            } else {
                passInput.type = 'password';
                eyeIcon.src = 'img/close-eye.svg';
                eyeIcon.style.opacity = '0.4';
            }
        }

        // Lógica del botón: cambia a verde solo cuando hay 6 dígitos
        passInput.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');
            const digitCount = this.value.length;
            
            if (digitCount === 6) {
                ingresarBtn.classList.remove('disabled-btn');
                ingresarBtn.classList.add('active-btn');
            } else {
                ingresarBtn.classList.remove('active-btn');
                ingresarBtn.classList.add('disabled-btn');
            }
        });

        // Validación final al presionar "Ingresar"
        function intentarIngresar() {
            const pin = passInput.value;
            
            if (pin.length === 6) {
                localStorage.setItem('sesion_iniciada', 'true');
                window.location.href = 'inicio.html';
            } else {
            }
        }

        passInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                intentarIngresar();
            }
        });
    </script>
</body>
</html>
